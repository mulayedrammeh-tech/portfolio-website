<h2>📩 Contact Me</h2>

<input id="msg" placeholder="Enter your message" style="padding:10px; width:300px;">
<br><br>

<button onclick="sendMessage()">Send</button>

<p id="status"></p>

<script>
async function sendMessage() {
  const message = document.getElementById("msg").value;
  const status = document.getElementById("status");

  try {
    const res = await fetch("http://51.21.3.88:3000/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    status.innerHTML = "✔ Sent: " + data.received;

  } catch (err) {
    console.log(err);
    status.innerHTML = "❌ Error connecting to backend (check EC2)";
  }
}
</script>
